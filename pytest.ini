[pytest]
testpaths = test_cases
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 注意：我们现在通过 conftest.py 自行生成报告，不再依赖 Allure
addopts = -v -s

# 失败重试配置
reruns = 2
reruns_delay = 1

markers =
    profile_account: Profile Account 模块相关测试
    financial_account: Financial Account 模块相关测试
    contact: Contact 模块相关测试
    sub_account: Sub Account 模块相关测试
    fbo_account: FBO Account 模块相关测试
    statement: Statement 模块相关测试
    identity_security: Identity Security 模块相关测试
    tenant: Tenant 模块相关测试
    open_banking: Open Banking 模块相关测试
    counterparty: Counterparty Management 模块相关测试
    trading_order: Trading Order 模块相关测试
    client_list: Client List 模块相关测试
    investment: Investment Reports 模块相关测试
    account_summary: Account Summary 模块相关测试
    update_api: 更新类接口测试
    list_api: 列表查询接口测试
    detail_api: 详情查询接口测试
    contact_api: Contacts 接口测试
    transaction_api: Settled Transactions 接口测试
    create_api: 创建类接口测试
    payment_detail_api: 支付详情接口测试
    transactions_api: 交易相关接口测试
    positions_api: 持仓相关接口测试
    settled_transactions_api: 已结算交易接口测试
    sub_accounts_api: Sub Accounts 接口测试
    fbo_accounts_api: FBO Accounts 接口测试
    tenant_info: Tenant 信息接口测试
    delete_api: 删除类接口测试
    mfa_api: MFA 相关接口测试
    export_api: 导出类接口测试
    chart_api: 图表数据接口测试
    statistics_api: 统计信息接口测试
    no_rerun: 禁止失败重试的测试（用于破坏性操作、断言失败等）

filterwarnings =
    ignore::urllib3.exceptions.NotOpenSSLWarning
