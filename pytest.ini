[pytest]
# 测试目录
testpaths = test_cases

# 测试文件、类、函数命名规则
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 运行参数
# --html=reports/report.html 生成 HTML 报告
# --self-contained-html 将 CSS 样式嵌入 HTML 文件，方便分享
addopts = -v --html=reports/report.html --self-contained-html --alluredir=reports/allure-results

# 禁用警告显示（可选，为了让控制台更干净）
filterwarnings =
    ignore::urllib3.exceptions.NotOpenSSLWarning
