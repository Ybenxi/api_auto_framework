name: Daily Interface Test

on:
  # 定时触发：每天北京时间凌晨 2:00（UTC 18:00 ）
  schedule:
    - cron: '0 18 * * *'
  
  # 手动触发
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      # 1. Checkout 代码
      - name: Checkout code
        uses: actions/checkout@v3
      
      # 2. 设置 Python 环境
      - name: Set up Python 3.9
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      
      # 3. 安装依赖
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest pytest-html pandas openpyxl
      
      # 4. 运行测试
      - name: Run tests
        id: run_tests
        continue-on-error: true
        run: |
          mkdir -p reports
          pytest test_cases/ -v --html=reports/report.html --self-contained-html || true
          echo "TEST_EXIT_CODE=$?" >> $GITHUB_ENV
      
      # 5. 生成测试用例列表
      - name: Generate test case list
        if: always()
        run: |
          python utils/generate_case_list.py
      
      # 6. 获取测试统计信息
      - name: Get test statistics
        if: always()
        id: test_stats
        run: |
          # 从 pytest 输出中提取统计信息（如果有）
          if [ -f reports/report.html ]; then
            echo "REPORT_EXISTS=true" >> $GITHUB_ENV
          else
            echo "REPORT_EXISTS=false" >> $GITHUB_ENV
          fi
          
          # 获取当前日期
          echo "TEST_DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV
          
          # 获取构建状态
          if [ "${{ env.TEST_EXIT_CODE }}" == "0" ]; then
            echo "BUILD_STATUS=✅ Success" >> $GITHUB_ENV
          else
            echo "BUILD_STATUS=❌ Failed" >> $GITHUB_ENV
          fi
      
      # 7. 发送邮件通知
      - name: Send email notification
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: '[Auto Test] Ben xi Interface Test Report - ${{ env.TEST_DATE }}'
          to: ${{ secrets.MAIL_TO }}
          from: ${{ secrets.MAIL_USERNAME }}
          body: |
            Ben xi Interface Test Report
            ========================================
            
            Build Status: ${{ env.BUILD_STATUS }}
            Test Date: ${{ env.TEST_DATE }}
            Workflow URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            
            ========================================
            
            Please check the attached files for detailed test results:
            - report.html: HTML test report
            - test_cases.xlsx: Test case list
            
            ========================================
            
            This is an automated email from GitHub Actions.
          attachments: |
            reports/report.html
            test_cases.xlsx
          priority: normal
