name: Daily Interface Test

on:
  # 定时触发：每天北京时间凌晨 2:00（UTC 18:00）
  schedule:
    - cron: '0 18 * * *'
  
  # 手动触发
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    env:
      PYTHONPATH: ${{ github.workspace }}
      ENV: DEV
      CORE: actc
    
    steps:
      # 1. Checkout 代码
      - name: Checkout code
        uses: actions/checkout@v3
      
      # 2. 设置 Python 环境
      - name: Set up Python 3.9
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      
      # 3. 安装依赖 (关键修复：确保安装了 pytest-json-report 和 openpyxl)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # 显式安装关键依赖，防止 requirements.txt 漏写
          pip install pytest pytest-html pytest-json-report pandas openpyxl requests
      
      # 4. 运行测试 (关键：生成 json-report 用于数据解析)
      - name: Run tests
        id: run_tests
        continue-on-error: true
        run: |
          mkdir -p reports
          # 注意：移除 --html 参数，让 conftest.py 自己生成带时间戳的报告
          pytest test_cases/ -v \
            --json-report \
            --json-report-file=reports/report.json || true
          
          # 记录退出码
          echo "TEST_EXIT_CODE=$?" >> $GITHUB_ENV
      
      # 5. 精准抓取并重命名最新的 HTML 报告 (修复附件为空的问题)
      - name: Find and rename latest report
        if: always()
        run: |
          # 查找 reports 目录下最新的 .html 文件 (排除 report.json)
          LATEST_REPORT=$(ls -t reports/*.html 2>/dev/null | head -1)
          
          if [ -n "$LATEST_REPORT" ]; then
            echo "找到最新报告文件: $LATEST_REPORT"
            # 重命名为 final_report.html，方便邮件插件读取
            cp "$LATEST_REPORT" reports/final_report.html
            echo "已重命名为: reports/final_report.html"
          else
            echo "警告: 未找到 HTML 报告文件"
            echo "<html><body><h1>No report generated</h1></body></html>" > reports/final_report.html
          fi
      
      # 6. 解析测试结果并提取统计信息
      - name: Parse test results
        if: always()
        run: |
          python3 << 'EOF'
          import json
          import os
          from pathlib import Path
          
          # 读取 JSON 报告
          report_file = Path("reports/report.json")
          
          if report_file.exists():
              with open(report_file, "r", encoding="utf-8") as f:
                  report_data = json.load(f)
              
              # 提取统计信息
              summary = report_data.get("summary", {})
              total = summary.get("total", 0)
              passed = summary.get("passed", 0)
              failed = summary.get("failed", 0)
              skipped = summary.get("skipped", 0)
              
              # 计算通过率
              if total > 0:
                  pass_rate = round((passed / total) * 100, 2)
              else:
                  pass_rate = 0.0
              
              # 获取环境信息
              environment = report_data.get("environment", {})
              python_version = environment.get("Python", "3.9")
              platform = environment.get("Platform", "Linux")
              
              # 写入环境变量
              with open(os.environ["GITHUB_ENV"], "a") as env_file:
                  env_file.write(f"TEST_TOTAL={total}\n")
                  env_file.write(f"TEST_PASSED={passed}\n")
                  env_file.write(f"TEST_FAILED={failed}\n")
                  env_file.write(f"TEST_SKIPPED={skipped}\n")
                  env_file.write(f"TEST_PASS_RATE={pass_rate}\n")
                  env_file.write(f"TEST_PYTHON={python_version}\n")
                  env_file.write(f"TEST_PLATFORM={platform}\n")
          else:
              print("警告: 未找到 report.json")
              with open(os.environ["GITHUB_ENV"], "a") as env_file:
                  env_file.write("TEST_TOTAL=0\nTEST_PASSED=0\nTEST_FAILED=0\nTEST_SKIPPED=0\nTEST_PASS_RATE=0.0\n")
          EOF
      
      # 7. 生成测试用例 Excel 列表
      - name: Generate test case list
        if: always()
        run: |
          # 确保 utils 脚本存在
          if [ -f utils/generate_case_list.py ]; then
            python utils/generate_case_list.py
          else
            echo "Warning: utils/generate_case_list.py not found"
            touch test_cases.xlsx # 创建空文件防止发邮件报错
          fi
      
      # 8. 准备构建状态图标
      - name: Prepare status icon
        if: always()
        run: |
          echo "TEST_DATE=$(date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_ENV
          if [ "${{ env.TEST_EXIT_CODE }}" == "0" ]; then
            echo "BUILD_STATUS=✅ Success" >> $GITHUB_ENV
            echo "BUILD_STATUS_ICON=✅" >> $GITHUB_ENV
          else
            echo "BUILD_STATUS=❌ Failed" >> $GITHUB_ENV
            echo "BUILD_STATUS_ICON=❌" >> $GITHUB_ENV
          fi
      
      # 9. 发送邮件 (样式已修复：白底黑字 Header)
      - name: Send email notification
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: '${{ env.BUILD_STATUS_ICON }} Ben xi Interface Test Report - ${{ env.TEST_DATE }}'
          to: ${{ secrets.MAIL_TO }}
          from: ${{ secrets.MAIL_USERNAME }}
          html_body: |
            <!DOCTYPE html>
            <html>
            <head>
                <style>
                    body {
                        font-family: 'Helvetica Neue', Arial, sans-serif;
                        line-height: 1.6;
                        color: #333;
                        max-width: 800px;
                        margin: 0 auto;
                        padding: 20px;
                        background-color: #ffffff;
                    }
                    /* Header 样式重构：白底黑字 */
                    .header {
                        background: #ffffff;
                        padding: 20px 0;
                        border-bottom: 3px solid #4472C4;
                        text-align: left;
                        margin-bottom: 30px;
                    }
                    .header h1 {
                        margin: 0;
                        font-size: 32px;
                        color: #000000;  /* 黑色文字 */
                        font-weight: 800;
                        letter-spacing: -0.5px;
                    }
                    .header p {
                        margin: 5px 0 0 0;
                        font-size: 16px;
                        color: #000000; /* 副标题也改为黑色或深灰，清晰可见 */
                        font-weight: 500;
                    }
                    /* 状态徽章 */
                    .status-badge {
                        display: inline-block;
                        padding: 6px 12px;
                        border-radius: 4px;
                        font-weight: bold;
                        font-size: 14px;
                        margin-bottom: 15px;
                        text-transform: uppercase;
                    }
                    .status-success {
                        background-color: #d1fae5;
                        color: #065f46;
                        border: 1px solid #10b981;
                    }
                    .status-failed {
                        background-color: #fee2e2;
                        color: #991b1b;
                        border: 1px solid #ef4444;
                    }
                    /* 表格样式 */
                    .info-table {
                        width: 100%;
                        border-collapse: collapse;
                        margin: 20px 0;
                        background: white;
                        border: 1px solid #e5e7eb;
                    }
                    .info-table th {
                        background-color: #f3f4f6;
                        color: #1f2937;
                        padding: 12px;
                        text-align: left;
                        font-weight: bold;
                        border-bottom: 2px solid #e5e7eb;
                    }
                    .info-table td {
                        padding: 12px;
                        border-bottom: 1px solid #e5e7eb;
                    }
                    .metric { font-size: 18px; font-weight: bold; color: #1f2937; }
                    .metric-label { font-size: 14px; color: #6b7280; }
                    .pass-rate { font-size: 24px; font-weight: bold; color: #10b981; }
                    .section-title {
                        font-size: 18px;
                        font-weight: bold;
                        color: #111827;
                        margin: 30px 0 10px 0;
                        padding-left: 10px;
                        border-left: 4px solid #4472C4;
                    }
                    .footer {
                        margin-top: 40px;
                        padding-top: 20px;
                        border-top: 1px solid #e5e7eb;
                        text-align: center;
                        color: #9ca3af;
                        font-size: 12px;
                    }
                    .footer a { color: #4472C4; text-decoration: none; }
                </style>
            </head>
            <body>
                <div class="header">
                    <span class="status-badge ${{ env.TEST_EXIT_CODE == '0' && 'status-success' || 'status-failed' }}">
                        ${{ env.BUILD_STATUS_ICON }} ${{ env.BUILD_STATUS }}
                    </span>
                    <h1>Ben xi Interface Test Report</h1>
                    <p>Automated Test Execution Report</p>
                </div>
                
                <div class="section-title">📊 Test Execution Summary</div>
                <table class="info-table">
                    <tr><th>Metric</th><th>Value</th></tr>
                    <tr><td><span class="metric-label">Total Tests</span></td><td><span class="metric">${{ env.TEST_TOTAL }}</span></td></tr>
                    <tr><td><span class="metric-label">Passed</span></td><td><span class="metric" style="color: #059669;">${{ env.TEST_PASSED }}</span></td></tr>
                    <tr><td><span class="metric-label">Failed</span></td><td><span class="metric" style="color: #dc2626;">${{ env.TEST_FAILED }}</span></td></tr>
                    <tr><td><span class="metric-label">Skipped</span></td><td><span class="metric" style="color: #d97706;">${{ env.TEST_SKIPPED }}</span></td></tr>
                    <tr><td><span class="metric-label">Pass Rate</span></td><td><span class="pass-rate">${{ env.TEST_PASS_RATE }}%</span></td></tr>
                </table>
                
                <div class="section-title">🔧 Environment Information</div>
                <table class="info-table">
                    <tr><th>Item</th><th>Value</th></tr>
                    <tr><td>Environment</td><td><strong>${{ env.TEST_ENV }}</strong></td></tr>
                    <tr><td>Core</td><td><strong>${{ env.TEST_CORE }}</strong></td></tr>
                    <tr><td>Python Version</td><td><strong>${{ env.TEST_PYTHON }}</strong></td></tr>
                    <tr><td>Platform</td><td><strong>${{ env.TEST_PLATFORM }}</strong></td></tr>
                    <tr><td>Execution Time</td><td><strong>${{ env.TEST_DATE }}</strong></td></tr>
                </table>
                
                <div class="section-title">📎 Attachments</div>
                <p style="margin-bottom: 10px; color: #4b5563;">Please check the attached files for detailed test results:</p>
                <ul style="color: #374151;">
                    <li style="margin-bottom: 5px;"><strong>final_report.html</strong> - Detailed HTML test report</li>
                    <li><strong>test_cases.xlsx</strong> - Complete test case list</li>
                </ul>
                
                <div class="footer">
                    <p>This is an automated email from GitHub Actions</p>
                    <p><a href="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}">View Workflow Run</a></p>
                </div>
            </body>
            </html>
          attachments: |
            reports/final_report.html
            test_cases.xlsx
          convert_markdown: false
